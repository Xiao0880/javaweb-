<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>登陆</title>
</head>
<body>
    <h1>图书管理系统</h1>
    <form action="reader_login" name="loginForm" method="post">
        <label for="reader_name">姓名：</label>
        <input type="text" id="reader_name" name="reader_name" required><br>
        <label for="reader_password">密码：</label>
        <input type="password" id="reader_password" name="reader_password" required><br>
        <input type="checkbox" id="remember_me" name="remember_me" value="true">
        <label for="remember_me">记住我（7天自动登录）</label><br>
        <a href="register.html">注册账号</a>
        <a href="admin/admin_login.html">管理员登陆</a><br>
        <input type="submit" value="登陆">
    </form>
</body>
</html>
