<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>图书管理系统 - 登录</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="login-container">
        <h1>图书管理系统</h1>
        <form action="reader_login" name="loginForm" method="post">
            <label for="reader_name">姓名：</label>
            <input type="text" id="reader_name" name="reader_name" required>
            
            <label for="reader_password">密码：</label>
            <input type="password" id="reader_password" name="reader_password" required>
            
            <input type="checkbox" id="remember_me" name="remember_me" value="true">
            <label for="remember_me" class="checkbox-label">记住我（7天自动登录）</label>
            
            <input type="submit" value="登录">
            
            <div class="form-links">
                <a href="register.html">注册账号</a>
                <a href="admin/admin_login.html">管理员登录</a>
            </div>
        </form>
    </div>
</body>
</html>
