<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>注册账号</title>
</head>
<body>
    <h1>注册账号</h1>
    <form action="reader_register" name="reader_register" method="post">
        <label for="reader_name">姓名：</label>
        <input type="text" id="reader_name" name="reader_name" required><br>
        <label for="reader_password">密码：</label>
        <input type="password" id="reader_password" name="reader_password" required><br>
        <label>性别：</label>
        <input type="radio" id="gender_male" name="gender" value="男" required>
        <label for="gender_male">男</label>
        <input type="radio" id="gender_female" name="gender" value="女">
        <label for="gender_female">女</label><br>
        <label for="phone">电话号码：</label>
        <input type="text" id="phone" name="phone" required><br>

        <input type="submit" value="注册">
    </form>
</body>
</html>
